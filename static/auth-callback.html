<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인증 처리중 - 다담 AI</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px">
    <div class="logo" style="font-size:24px;font-weight:700;color:var(--primary)">다담 AI</div>
    <p style="color:var(--text-secondary)" id="status">로그인 처리중...</p>
    <div id="error" style="display:none;color:var(--error);font-size:14px"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = window.__SUPABASE_URL__ || localStorage.getItem('supabase_url') || '';
    const SUPABASE_ANON_KEY = window.__SUPABASE_ANON_KEY__ || localStorage.getItem('supabase_anon_key') || '';

    async function handleCallback() {
      try {
        if (!SUPABASE_URL || !SUPABASE_ANON_KEY) throw new Error('Supabase 설정이 필요합니다.');

        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const { data, error } = await sb.auth.getSession();
        if (error) throw error;

        if (data.session) {
          localStorage.setItem('dadam_token', data.session.access_token);
          localStorage.setItem('dadam_refresh_token', data.session.refresh_token);
          localStorage.setItem('dadam_user', JSON.stringify({
            id: data.session.user.id,
            email: data.session.user.email,
          }));
          document.getElementById('status').textContent = '로그인 성공! 이동중...';
          setTimeout(() => window.location.href = '/projects.html', 500);
        } else {
          throw new Error('세션을 가져올 수 없습니다.');
        }
      } catch (err) {
        document.getElementById('status').textContent = '로그인 실패';
        const errEl = document.getElementById('error');
        errEl.textContent = err.message;
        errEl.style.display = 'block';
        setTimeout(() => window.location.href = '/login.html', 3000);
      }
    }

    handleCallback();
  </script>
</body>
</html>
