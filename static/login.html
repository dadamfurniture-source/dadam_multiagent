<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - 다담 AI</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .auth-container { max-width: 400px; margin: 80px auto; padding: 0 24px; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; box-shadow: var(--shadow-lg); }
    .auth-title { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 8px; }
    .auth-subtitle { font-size: 14px; color: var(--text-secondary); text-align: center; margin-bottom: 28px; }
    .auth-divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--text-secondary); font-size: 12px; }
    .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .auth-link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-secondary); }
    .auth-link a { color: var(--primary); text-decoration: none; font-weight: 500; }
    .auth-link a:hover { text-decoration: underline; }
    .auth-error { background: #fee2e2; border: 1px solid #fecaca; color: #991b1b; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .oauth-btn { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s; }
    .oauth-btn:hover { background: var(--bg); }
    .forgot-link { display: block; text-align: right; font-size: 12px; color: var(--primary); text-decoration: none; margin-top: -12px; margin-bottom: 16px; }
    .forgot-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <a href="/" class="logo">다담 AI</a>
    </div>
  </header>

  <div class="auth-container">
    <div class="auth-card">
      <h1 class="auth-title">로그인</h1>
      <p class="auth-subtitle">다담 AI 계정으로 로그인하세요</p>

      <div id="auth-error" class="auth-error"></div>

      <!-- OAuth -->
      <button class="oauth-btn" onclick="loginWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Google로 로그인
      </button>

      <div class="auth-divider">또는</div>

      <!-- Email Login -->
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">이메일</label>
          <input type="email" id="email" class="form-input" placeholder="email@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호</label>
          <input type="password" id="password" class="form-input" placeholder="비밀번호" required>
        </div>
        <a href="/forgot-password.html" class="forgot-link">비밀번호를 잊으셨나요?</a>
        <button type="submit" class="btn btn-primary" style="width:100%" id="login-btn">로그인</button>
      </form>

      <div class="auth-link">
        계정이 없으신가요? <a href="/signup.html">회원가입</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    let supabase = null;

    // Already logged in? Redirect
    if (localStorage.getItem('dadam_token')) {
      window.location.href = '/projects.html';
    }

    // Load Supabase config from server
    async function initSupabase() {
      try {
        const resp = await fetch('/api/v1/config');
        const cfg = await resp.json();
        if (cfg.supabase_url && cfg.supabase_anon_key) {
          supabase = window.supabase.createClient(cfg.supabase_url, cfg.supabase_anon_key);
        }
      } catch (e) {
        console.error('Failed to load config:', e);
      }
    }
    initSupabase();

    function showError(msg) {
      const el = document.getElementById('auth-error');
      el.textContent = msg;
      el.style.display = 'block';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');

      btn.disabled = true;
      btn.textContent = '로그인 중...';
      document.getElementById('auth-error').style.display = 'none';

      try {
        if (!supabase) throw new Error('Supabase 설정이 필요합니다.');

        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;

        localStorage.setItem('dadam_token', data.session.access_token);
        localStorage.setItem('dadam_refresh_token', data.session.refresh_token);
        localStorage.setItem('dadam_user', JSON.stringify({
          id: data.user.id,
          email: data.user.email,
        }));

        const redirect = new URLSearchParams(window.location.search).get('redirect') || '/projects.html';
        window.location.href = redirect;
      } catch (err) {
        showError(err.message === 'Invalid login credentials'
          ? '이메일 또는 비밀번호가 올바르지 않습니다.'
          : err.message || '로그인에 실패했습니다.');
        btn.disabled = false;
        btn.textContent = '로그인';
      }
    }

    async function loginWithGoogle() {
      if (!supabase) return showError('Supabase 설정이 필요합니다.');
      try {
        const { error } = await supabase.auth.signInWithOAuth({
          provider: 'google',
          options: { redirectTo: window.location.origin + '/auth-callback.html' },
        });
        if (error) throw error;
      } catch (err) {
        showError(err.message || 'Google 로그인에 실패했습니다.');
      }
    }
  </script>
</body>
</html>
