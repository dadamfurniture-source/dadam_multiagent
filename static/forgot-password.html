<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 재설정 - 다담 AI</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .auth-container { max-width: 400px; margin: 80px auto; padding: 0 24px; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; box-shadow: var(--shadow-lg); }
    .auth-title { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 8px; }
    .auth-subtitle { font-size: 14px; color: var(--text-secondary); text-align: center; margin-bottom: 28px; }
    .auth-link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-secondary); }
    .auth-link a { color: var(--primary); text-decoration: none; font-weight: 500; }
    .auth-link a:hover { text-decoration: underline; }
    .auth-error { background: #fee2e2; border: 1px solid #fecaca; color: #991b1b; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .auth-success { background: #d1fae5; border: 1px solid #a7f3d0; color: #065f46; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
  </style>
</head>
<body>
  <header class="header" id="site-header"></header>
  <script src="/static/js/app.js"></script>

  <div class="auth-container">
    <div class="auth-card">
      <h1 class="auth-title">비밀번호 재설정</h1>
      <p class="auth-subtitle">가입한 이메일 주소를 입력하면 재설정 링크를 보내드립니다</p>

      <div id="auth-error" class="auth-error"></div>
      <div id="auth-success" class="auth-success"></div>

      <form id="reset-form" onsubmit="handleReset(event)">
        <div class="form-group">
          <label class="form-label">이메일</label>
          <input type="email" id="email" class="form-input" placeholder="email@example.com" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%" id="reset-btn">재설정 링크 보내기</button>
      </form>

      <div class="auth-link">
        <a href="/login.html">로그인으로 돌아가기</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    var sb = null;

    async function initSupabase() {
      try {
        const resp = await fetch('/api/v1/config');
        const cfg = await resp.json();
        if (cfg.supabase_url && cfg.supabase_anon_key) {
          sb = window.supabase.createClient(cfg.supabase_url, cfg.supabase_anon_key);
        }
      } catch (e) {
        console.error('Failed to load config:', e);
      }
    }
    initSupabase();

    function showError(msg) {
      const el = document.getElementById('auth-error');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('auth-success').style.display = 'none';
    }

    function showSuccess(msg) {
      const el = document.getElementById('auth-success');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('auth-error').style.display = 'none';
    }

    async function handleReset(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const btn = document.getElementById('reset-btn');

      btn.disabled = true;
      btn.textContent = '전송 중...';
      document.getElementById('auth-error').style.display = 'none';

      try {
        if (!sb) throw new Error('Supabase 설정이 필요합니다.');

        const { error } = await sb.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/login.html',
        });
        if (error) throw error;

        showSuccess('비밀번호 재설정 이메일을 발송했습니다. 이메일을 확인해주세요.');
        document.getElementById('reset-form').style.display = 'none';
      } catch (err) {
        showError(err.message || '이메일 전송에 실패했습니다.');
        btn.disabled = false;
        btn.textContent = '재설정 링크 보내기';
      }
    }
  </script>
</body>
</html>
