<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>참고 이미지 관리 - 다담 AI</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .ref-container { max-width: 900px; margin: 40px auto; padding: 0 24px; }
    .upload-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }
    .upload-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .upload-row .form-group { flex: 1; min-width: 140px; }
    .preview-img { max-width: 120px; max-height: 80px; border-radius: 6px; object-fit: cover; }
    .ref-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .ref-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .ref-card img { width: 100%; height: 150px; object-fit: cover; }
    .ref-card .info { padding: 10px; font-size: 13px; }
    .ref-card .info .tags { display: flex; gap: 6px; margin-bottom: 6px; }
    .ref-card .info .tag { background: var(--bg); padding: 2px 8px; border-radius: 4px; font-size: 11px; }
    .ref-card .delete-btn { color: #ef4444; cursor: pointer; font-size: 12px; border: none; background: none; padding: 0; }
    .ref-card .delete-btn:hover { text-decoration: underline; }
    .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .msg-ok { background: #d1fae5; border: 1px solid #a7f3d0; color: #065f46; }
    .msg-err { background: #fee2e2; border: 1px solid #fecaca; color: #991b1b; }
  </style>
</head>
<body>
  <header class="header" id="site-header"></header>
  <script src="/static/js/app.js"></script>

  <div class="ref-container">
    <h1 style="margin-bottom:24px">참고 이미지 관리</h1>

    <!-- Upload -->
    <div class="upload-card">
      <h3 style="margin-bottom:12px">참고 이미지 업로드</h3>
      <div id="msg-ok" class="msg msg-ok"></div>
      <div id="msg-err" class="msg msg-err"></div>
      <form id="upload-form" onsubmit="handleUpload(event)">
        <div class="upload-row">
          <div class="form-group">
            <label class="form-label">카테고리</label>
            <select id="ref-category" class="form-input" required>
              <option value="">선택</option>
              <option value="sink">싱크대</option>
              <option value="island">아일랜드</option>
              <option value="closet">붙박이장</option>
              <option value="fridge_cabinet">냉장고장</option>
              <option value="shoe_cabinet">신발장</option>
              <option value="vanity">화장대</option>
              <option value="storage">수납장</option>
              <option value="utility_closet">창고장</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">스타일</label>
            <select id="ref-style" class="form-input" required>
              <option value="">선택</option>
              <option value="modern">모던</option>
              <option value="nordic">북유럽</option>
              <option value="classic">클래식</option>
              <option value="natural">내추럴</option>
              <option value="industrial">인더스트리얼</option>
              <option value="luxury">럭셔리</option>
            </select>
          </div>
          <div class="form-group" style="flex:2">
            <label class="form-label">이미지 (여러 장 선택 가능)</label>
            <input type="file" id="ref-file" accept="image/*" multiple required class="form-input" onchange="previewFiles(this)">
          </div>
          <button type="submit" class="btn btn-primary" id="upload-btn">업로드</button>
        </div>
        <div id="preview-area" style="margin-top:12px;display:none;display:flex;gap:8px;flex-wrap:wrap"></div>
        <div id="upload-progress" style="margin-top:8px;display:none;font-size:13px;color:var(--text-secondary)"></div>
      </form>
    </div>

    <!-- Filter + List -->
    <div class="filter-bar">
      <select id="filter-category" class="form-input" style="width:auto" onchange="loadRefs()">
        <option value="">전체 카테고리</option>
        <option value="sink">싱크대</option>
        <option value="island">아일랜드</option>
        <option value="closet">붙박이장</option>
        <option value="fridge_cabinet">냉장고장</option>
        <option value="shoe_cabinet">신발장</option>
        <option value="vanity">화장대</option>
        <option value="storage">수납장</option>
        <option value="utility_closet">창고장</option>
      </select>
      <select id="filter-style" class="form-input" style="width:auto" onchange="loadRefs()">
        <option value="">전체 스타일</option>
        <option value="modern">모던</option>
        <option value="nordic">북유럽</option>
        <option value="classic">클래식</option>
        <option value="natural">내추럴</option>
        <option value="industrial">인더스트리얼</option>
        <option value="luxury">럭셔리</option>
      </select>
      <span id="ref-count" style="color:var(--text-secondary);font-size:13px;align-self:center"></span>
    </div>

    <div class="ref-grid" id="ref-grid">
      <p style="color:var(--text-secondary);text-align:center;grid-column:1/-1;padding:48px">로딩 중...</p>
    </div>
  </div>

  <script>
    const API = '/api/v1';
    const CATEGORY_NAMES = {sink:'싱크대',island:'아일랜드',closet:'붙박이장',fridge_cabinet:'냉장고장',shoe_cabinet:'신발장',vanity:'화장대',storage:'수납장',utility_closet:'창고장'};
    const STYLE_NAMES = {modern:'모던',nordic:'북유럽',classic:'클래식',natural:'내추럴',industrial:'인더스트리얼',luxury:'럭셔리'};

    function previewFiles(input) {
      const area = document.getElementById('preview-area');
      area.innerHTML = '';
      const files = input.files;
      if (!files.length) { area.style.display = 'none'; return; }
      area.style.display = 'flex';
      Array.from(files).forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = document.createElement('img');
          img.src = e.target.result;
          img.className = 'preview-img';
          area.appendChild(img);
        };
        reader.readAsDataURL(file);
      });
    }

    function showMsg(type, text) {
      const ok = document.getElementById('msg-ok');
      const err = document.getElementById('msg-err');
      ok.style.display = 'none';
      err.style.display = 'none';
      if (type === 'ok') { ok.textContent = text; ok.style.display = 'block'; }
      else { err.textContent = text; err.style.display = 'block'; }
    }

    async function handleUpload(e) {
      e.preventDefault();
      const btn = document.getElementById('upload-btn');
      const files = document.getElementById('ref-file').files;
      const category = document.getElementById('ref-category').value;
      const style = document.getElementById('ref-style').value;
      const progress = document.getElementById('upload-progress');

      if (!files.length) return;

      btn.disabled = true;
      progress.style.display = 'block';

      const token = localStorage.getItem('dadam_token');
      let success = 0;
      let failed = 0;

      for (let i = 0; i < files.length; i++) {
        progress.textContent = `업로드 중... (${i + 1}/${files.length})`;
        btn.textContent = `${i + 1}/${files.length}`;

        try {
          const formData = new FormData();
          formData.append('image', files[i]);
          formData.append('category', category);
          formData.append('style', style);

          const resp = await fetch(`${API}/references`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` },
            body: formData,
          });

          if (!resp.ok) {
            const data = await resp.json();
            throw new Error(data.message || data.detail || '업로드 실패');
          }
          success++;
        } catch (err) {
          failed++;
          console.error(`File ${files[i].name} failed:`, err);
        }
      }

      progress.style.display = 'none';
      if (failed === 0) {
        showMsg('ok', `${success}장 업로드 완료`);
      } else {
        showMsg('err', `${success}장 성공, ${failed}장 실패`);
      }

      document.getElementById('upload-form').reset();
      document.getElementById('preview-area').style.display = 'none';
      document.getElementById('preview-area').innerHTML = '';
      btn.disabled = false;
      btn.textContent = '업로드';
      loadRefs();
    }

    async function loadRefs() {
      const cat = document.getElementById('filter-category').value;
      const sty = document.getElementById('filter-style').value;
      let url = `${API}/references?`;
      if (cat) url += `category=${cat}&`;
      if (sty) url += `style=${sty}&`;

      const grid = document.getElementById('ref-grid');
      try {
        const token = localStorage.getItem('dadam_token');
        const resp = await fetch(url, {
          headers: { 'Authorization': `Bearer ${token}` },
        });
        const data = await resp.json();
        const items = data.data?.items || [];

        document.getElementById('ref-count').textContent = `${items.length}개`;

        if (!items.length) {
          grid.innerHTML = '<p style="color:var(--text-secondary);text-align:center;grid-column:1/-1;padding:48px">등록된 참고 이미지가 없습니다.</p>';
          return;
        }

        grid.innerHTML = items.map(item => `
          <div class="ref-card">
            <img src="${item.image_url}" alt="${item.description || ''}" loading="lazy">
            <div class="info">
              <div class="tags">
                <span class="tag">${CATEGORY_NAMES[item.category] || item.category}</span>
                <span class="tag">${STYLE_NAMES[item.style] || item.style}</span>
              </div>
              ${item.description ? `<div style="color:var(--text-secondary);margin-bottom:4px">${item.description}</div>` : ''}
              <button class="delete-btn" onclick="deleteRef('${item.id}')">삭제</button>
            </div>
          </div>
        `).join('');
      } catch (err) {
        grid.innerHTML = `<p style="color:#ef4444;text-align:center;grid-column:1/-1;padding:48px">${err.message}</p>`;
      }
    }

    async function deleteRef(id) {
      if (!confirm('이 참고 이미지를 삭제할까요?')) return;
      try {
        const token = localStorage.getItem('dadam_token');
        await fetch(`${API}/references/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` },
        });
        loadRefs();
      } catch (err) {
        alert('삭제 실패: ' + err.message);
      }
    }

    // Init
    document.addEventListener('DOMContentLoaded', () => loadRefs());
  </script>
</body>
</html>
