<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 계정 - 다담 AI</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .account-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 24px; }
    .plan-badge { display: inline-block; padding: 4px 12px; border-radius: 16px; font-size: 12px; font-weight: 600; }
    .plan-badge.free { background: #f1f5f9; color: #475569; }
    .plan-badge.basic { background: #dbeafe; color: #1e40af; }
    .plan-badge.pro { background: #fef3c7; color: #92400e; }
    .plan-badge.enterprise { background: #ede9fe; color: #5b21b6; }
    .usage-meter { margin-top: 12px; }
    .usage-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .usage-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
    .usage-text { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
    .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .info-label { color: var(--text-secondary); }
    .info-value { font-weight: 500; }
    .danger-zone { border: 1px solid #fecaca; border-radius: var(--radius); padding: 20px; margin-top: 32px; }
    .danger-zone h3 { color: var(--error); font-size: 16px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <header class="header" id="site-header"></header>

  <main style="padding:40px 0">
    <div class="container" style="max-width:800px">
      <h1 style="margin-bottom:24px">내 계정</h1>

      <div class="account-grid">
        <!-- Plan Card -->
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
            <h3>현재 플랜</h3>
            <span class="plan-badge" id="plan-badge">-</span>
          </div>
          <div class="usage-meter" id="usage-section">
            <div style="font-size:14px;margin-bottom:6px">이번 달 시뮬레이션</div>
            <div class="usage-bar"><div class="usage-fill" id="usage-fill" style="width:0%;background:var(--primary)"></div></div>
            <div class="usage-text"><span id="usage-count">0 / 3</span><span id="usage-pct">0%</span></div>
          </div>
          <a href="/pricing.html" class="btn btn-outline btn-sm" style="margin-top:16px;display:inline-block">플랜 변경</a>
        </div>

        <!-- Account Info -->
        <div class="card">
          <h3 style="margin-bottom:16px">계정 정보</h3>
          <div class="info-row"><span class="info-label">이메일</span><span class="info-value" id="user-email">-</span></div>
          <div class="info-row"><span class="info-label">가입일</span><span class="info-value" id="user-created">-</span></div>
          <div class="info-row"><span class="info-label">회사명</span><span class="info-value" id="user-company">-</span></div>
          <div class="info-row" style="border:none"><span class="info-label">회사 유형</span><span class="info-value" id="user-type">-</span></div>
        </div>
      </div>

      <!-- Stats -->
      <div class="card" style="margin-bottom:24px">
        <h3 style="margin-bottom:16px">활동 요약</h3>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px">
          <div><div style="font-size:28px;font-weight:700" id="stat-projects">-</div><div style="font-size:13px;color:var(--text-secondary)">총 프로젝트</div></div>
          <div><div style="font-size:28px;font-weight:700" id="stat-orders">-</div><div style="font-size:13px;color:var(--text-secondary)">주문</div></div>
          <div><div style="font-size:28px;font-weight:700" id="stat-completed">-</div><div style="font-size:13px;color:var(--text-secondary)">완료된 시뮬레이션</div></div>
        </div>
      </div>

      <!-- Pro+ features info -->
      <div class="card" id="upgrade-cta" style="margin-bottom:24px;display:none">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <h3>Pro로 업그레이드</h3>
            <p style="font-size:13px;color:var(--text-secondary);margin-top:4px">상세 설계도, BOM, 매출매입 관리 기능을 활용하세요.</p>
          </div>
          <a href="/pricing.html" class="btn btn-primary btn-sm">업그레이드</a>
        </div>
      </div>

      <!-- Danger Zone -->
      <div class="danger-zone">
        <h3>계정 관리</h3>
        <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px">계정 데이터를 관리합니다.</p>
        <button class="btn btn-outline btn-sm" style="color:var(--error);border-color:var(--error)" onclick="handleLogout()">로그아웃</button>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/static/js/app.js"></script>
  <script>
    const API_BASE = '/api/v1';

    async function loadAccount() {
      const user = JSON.parse(localStorage.getItem('dadam_user') || '{}');
      document.getElementById('user-email').textContent = user.email || '-';

      try {
        // Load profile + plan info via a project list call (gets us plan gating info)
        const resp = await fetch(`${API_BASE}/projects?per_page=1`, {
          headers: { 'Authorization': `Bearer ${localStorage.getItem('dadam_token')}` },
        });

        if (resp.status === 401) {
          window.location.href = '/login.html';
          return;
        }

        const data = await resp.json();
        const total = data.data?.total || 0;
        document.getElementById('stat-projects').textContent = total;

        // Projects by status
        const allResp = await fetch(`${API_BASE}/projects?per_page=100`, {
          headers: { 'Authorization': `Bearer ${localStorage.getItem('dadam_token')}` },
        });
        const allData = await allResp.json();
        const items = allData.data?.items || [];
        const completed = items.filter(p => p.status === 'completed').length;
        document.getElementById('stat-completed').textContent = completed;

        // Determine plan from pricing page or subscription endpoint
        try {
          const subResp = await fetch(`${API_BASE}/payments/subscription`, {
            headers: { 'Authorization': `Bearer ${localStorage.getItem('dadam_token')}` },
          });
          const subData = await subResp.json();
          const plan = subData.data?.plan || 'free';
          const badge = document.getElementById('plan-badge');
          badge.textContent = plan.charAt(0).toUpperCase() + plan.slice(1);
          badge.className = `plan-badge ${plan}`;

          // Usage meter
          const limits = { free: 3, basic: -1, pro: -1, enterprise: -1 };
          const limit = limits[plan];
          if (limit > 0) {
            // Count this month's projects
            const now = new Date();
            const monthStart = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-01`;
            const thisMonth = items.filter(p => p.created_at >= monthStart).length;
            const pct = Math.min(100, (thisMonth / limit) * 100);
            document.getElementById('usage-fill').style.width = pct + '%';
            document.getElementById('usage-fill').style.background = pct >= 90 ? 'var(--error)' : pct >= 60 ? 'var(--warning)' : 'var(--primary)';
            document.getElementById('usage-count').textContent = `${thisMonth} / ${limit}`;
            document.getElementById('usage-pct').textContent = `${Math.round(pct)}%`;
          } else {
            document.getElementById('usage-count').textContent = '무제한';
            document.getElementById('usage-fill').style.width = '100%';
            document.getElementById('usage-fill').style.background = 'var(--success)';
            document.getElementById('usage-pct').textContent = '';
          }

          // Show upgrade CTA for free/basic
          if (plan === 'free' || plan === 'basic') {
            document.getElementById('upgrade-cta').style.display = 'block';
          }
        } catch (e) {
          document.getElementById('plan-badge').textContent = 'Free';
          document.getElementById('plan-badge').className = 'plan-badge free';
        }

        // Orders count
        try {
          const ordResp = await fetch(`${API_BASE}/orders?per_page=1`, {
            headers: { 'Authorization': `Bearer ${localStorage.getItem('dadam_token')}` },
          });
          const ordData = await ordResp.json();
          document.getElementById('stat-orders').textContent = ordData.data?.total || 0;
        } catch (e) {
          document.getElementById('stat-orders').textContent = '0';
        }

      } catch (err) {
        console.error('Failed to load account:', err);
      }
    }

    function handleLogout() {
      localStorage.removeItem('dadam_token');
      localStorage.removeItem('dadam_refresh_token');
      localStorage.removeItem('dadam_user');
      window.location.href = '/login.html';
    }

    document.addEventListener('DOMContentLoaded', loadAccount);
  </script>
</body>
</html>
