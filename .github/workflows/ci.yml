name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check api/ shared/ workers/ agents/ --output-format=github

      - name: Run E2E tests
        run: |
          python tests/test_pipeline_e2e.py

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t dadam-saas:${{ github.sha }} .

      - name: Verify health check
        run: |
          docker run -d --name test-api -p 8000:8000 \
            -e ENVIRONMENT=development \
            dadam-saas:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health || (docker logs test-api && exit 1)
          docker stop test-api
